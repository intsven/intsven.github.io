<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>intsven | Projects</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
            --card-bg: #1e293b;
            --card-hover: #334155;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.2rem;
            color: #94a3b8;
            margin-bottom: 2rem;
        }

        .container {
            max-width: 800px;
            padding: 2rem;
        }

        .project-card {
            background-color: var(--card-bg);
            border-radius: 1rem;
            padding: 2rem;
            text-decoration: none;
            color: inherit;
            display: block;
            transition: transform 0.2s, background-color 0.2s;
            border: 1px solid #334155;
            max-width: 400px;
            margin: 0 auto;
        }

        .project-card:hover {
            transform: translateY(-5px);
            background-color: var(--card-hover);
            border-color: var(--accent-color);
        }

        .project-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
            display: block;
            color: var(--accent-color);
        }

        .project-description {
            font-size: 1rem;
            color: #94a3b8;
        }

        footer {
            margin-top: 4rem;
            font-size: 0.9rem;
            color: #64748b;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>intsven</h1>
        <p>Experiments and Projects</p>

        <a href="Muttertag/" class="project-card">
            <span class="project-title">Abstract Muttertag 3D</span>
            <span class="project-description">Procedural geometry & parameter sweeps for Mother's Day.</span>
        </a>
    </div>

    <footer>
        &copy; 2026 intsven
    </footer>
</body>
</html>
